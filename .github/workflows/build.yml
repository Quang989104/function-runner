name: Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for PoC"
        required: true
        type: string
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: x86_64-unknown-linux-gnu
            path: README.md
            # Bỏ dấu ngoặc kép bao quanh để tránh lỗi YAML mapping
            asset_name: test-output

    steps:
      - uses: actions/checkout@v4

      - name: Archive assets (Vulnerable Step)
        run: |
          # Dùng trực tiếp input vào shell để chứng minh RCE nhanh nhất
          TAG_NAME="${{ github.event.inputs.tag_name }}"
          echo "Debug: Tag name is $TAG_NAME"
          
          # Lệnh gốc bị lỗi injection (không có dấu ngoặc kép bao quanh biến)
          gzip -c ${{ matrix.path }} > test.gz && mv test.gz function-runner-$TAG_NAME.gz
